<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Room Details - FunXLink Studio Phira Server</title>
    <link rel="icon" href="logo.png" type="image/png" />
    <link rel="stylesheet" href="style.css" />
    <script src="i18n.js"></script>
  </head>
  <body>
    <script>
      (function () {
        var t = localStorage.getItem('theme');
        if (t === 'light') document.body.classList.add('light-mode');
        I18n.init();
      })();
    </script>

    <nav class="navbar" id="navbar">
      <div class="navbar-container">
        <div class="navbar-brand">
          <a href="/" class="brand-link"
            ><img
              class="brand-icon"
              src="https://phira.moe/favicon-96x96.png"
              alt="Phira"
              width="28"
              height="28"
            /><span class="brand-name" id="brand-name">Phira Server</span></a
          >
        </div>
        <div class="navbar-nav">
          <a href="/" class="nav-item" data-page="home"
            ><svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16">
              <rect
                x="3"
                y="6"
                width="10"
                height="7"
                rx="1"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <path
                d="M2 7 L8 2 L14 7"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              /></svg
            ><span class="nav-text" data-i18n="nav.home">Home</span></a
          >
          <a href="/room" class="nav-item active" data-page="rooms"
            ><svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16">
              <rect
                x="2"
                y="1"
                width="12"
                height="14"
                rx="1"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <line x1="6" y1="1" x2="6" y2="15" stroke="currentColor" stroke-width="1.5" />
              <line x1="10" y1="1" x2="10" y2="15" stroke="currentColor" stroke-width="1.5" /></svg
            ><span class="nav-text" data-i18n="nav.rooms">Rooms</span></a
          >
          <a href="/players" class="nav-item" data-page="players"
            ><svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16">
              <circle cx="6" cy="5" r="2.5" fill="none" stroke="currentColor" stroke-width="1.5" />
              <path
                d="M2 14 Q2 10 6 10 Q10 10 10 14"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <circle
                cx="11"
                cy="6"
                r="2"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-dasharray="1.5 1"
              />
              <path
                d="M9 13 Q9 11 11 11 Q13 11 13 13"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-dasharray="1.5 1"
              /></svg
            ><span class="nav-text" data-i18n="nav.players">Players</span></a
          >
          <a href="/panel" class="nav-item" id="nav-admin"
            ><svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16">
              <circle cx="8" cy="8" r="3" fill="none" stroke="currentColor" stroke-width="1.5" />
              <path
                d="M8 1 L8 4 M8 12 L8 15 M1 8 L4 8 M12 8 L15 8"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
              <circle
                cx="8"
                cy="8"
                r="5"
                fill="none"
                stroke="currentColor"
                stroke-width="1"
                stroke-dasharray="2 2"
              /></svg
            ><span class="nav-text" data-i18n="nav.admin">Admin</span></a
          >
        </div>
        <div class="navbar-right">
          <div class="lang-switch" onclick="I18n.toggleLanguage()">
            <svg width="16" height="16" viewBox="0 0 16 16">
              <circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="1.2" />
              <ellipse
                cx="8"
                cy="8"
                rx="3"
                ry="6"
                fill="none"
                stroke="currentColor"
                stroke-width="1.2"
              />
              <line x1="2" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="1.2" />
            </svg>
          </div>
          <button id="theme-toggle" class="theme-btn">
            <svg width="16" height="16" viewBox="0 0 16 16" id="theme-icon-svg">
              <circle cx="8" cy="8" r="5" fill="none" stroke="currentColor" stroke-width="1.2" />
              <path d="M8 1 A7 7 0 0 0 8 15 A5 5 0 0 1 8 1" fill="currentColor" opacity="0.3" />
            </svg>
          </button>
        </div>
      </div>
    </nav>

    <div id="announcement-popup"></div>

    <!-- Inline Action Modal -->
    <div id="admin-inline-modal" class="admin-modal-overlay" style="display: none">
      <div class="admin-modal">
        <div class="admin-modal-header">
          <div class="admin-modal-title" id="admin-inline-title">Action</div>
          <button
            class="admin-modal-close"
            onclick="document.getElementById('admin-inline-modal').style.display='none'"
          >
            &times;
          </button>
        </div>
        <div class="admin-modal-body" id="admin-inline-body"></div>
        <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px">
          <button
            class="admin-btn"
            onclick="document.getElementById('admin-inline-modal').style.display='none'"
          >
            Cancel
          </button>
          <button class="admin-btn action-primary" id="admin-inline-confirm">Confirm</button>
        </div>
      </div>
    </div>

    <div class="container">
      <!-- Secret Admin Modal (Easter Egg) -->
      <div id="admin-secret-modal" class="admin-modal-overlay">
        <div class="admin-modal">
          <button
            class="admin-modal-close"
            onclick="document.getElementById('admin-secret-modal').style.display='none'"
          >
            &times;
          </button>
          <div class="admin-modal-header">
            <div class="admin-modal-title">Admin Management Panel</div>
          </div>
          <div class="admin-modal-body">
            <div class="admin-modal-grid" id="admin-modal-buttons">
              <!-- Buttons 1-20 will be injected here -->
            </div>
          </div>
        </div>
      </div>

      <header>
        <h1 id="room-name" data-i18n="common.loading">Loading Room...</h1>
        <div class="connection-status" id="connection-status" data-i18n="common.loading">
          Connecting...
        </div>
      </header>

      <main>
        <nav style="margin-bottom: 16px">
          <a href="/" class="back-link">
            <svg width="14" height="14" viewBox="0 0 14 14">
              <path
                d="M8 3 L4 7 L8 11"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <span data-i18n="room.back_home">Back to Room List</span>
          </a>
        </nav>

        <section id="room-details" class="details-grid">
          <!-- Room details will be injected by room.js -->
        </section>
      </main>

      <footer
        style="
          text-align: center;
          padding: 32px 20px;
          border-top: 1px solid var(--border);
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 14px;
        "
      >
        <p style="margin: 0" data-i18n="common.server_ip">Game Server IP:</p>
        <div class="server-ip-container" id="copy-ip">
          <code id="server-ip">...</code>
          <span class="copy-icon">Copy</span>
        </div>

        <!-- Update server IP and title from config -->
        <script>
          if (window.SERVER_CONFIG) {
            if (window.SERVER_CONFIG.displayIp) {
              document.getElementById('server-ip').textContent = window.SERVER_CONFIG.displayIp;
            }
            if (window.SERVER_CONFIG.serverName) {
              document.title = 'Room Details - ' + window.SERVER_CONFIG.serverName;
            }
          }
        </script>

        <div class="footer-controls">
          <button id="theme-toggle" class="theme-toggle-btn">
            <span id="theme-icon" class="theme-icon">Dark</span>
            <span id="theme-text" data-i18n="common.dark_mode">Dark Mode</span>
          </button>
          <button id="lang-toggle" class="lang-toggle-btn" onclick="I18n.toggleLanguage()">
            <span>Lang</span>
            <span id="lang-toggle-text">English</span>
          </button>
        </div>
      </footer>
    </div>

    <script src="room.js"></script>

    <script>
      document.getElementById('theme-toggle').addEventListener('click', function () {
        document.body.classList.toggle('light-mode');
        localStorage.setItem(
          'theme',
          document.body.classList.contains('light-mode') ? 'light' : 'dark',
        );
      });

      document.getElementById('copy-ip').addEventListener('click', function () {
        var ip = document.getElementById('server-ip').textContent;
        navigator.clipboard
          .writeText(ip)
          .then(function () {
            alert(I18n.t('common.copy_success'));
          })
          .catch(function (err) {
            console.error('Copy failed: ', err);
          });
      });

      // Easter Egg Logic
      (function () {
        var clickCount = 0;
        var lastClickTime = 0;
        var title = document.getElementById('room-name');
        if (title) {
          title.style.userSelect = 'none';
          title.style.cursor = 'pointer';
          title.addEventListener('click', async function () {
            var currentTime = Date.now();
            if (currentTime - lastClickTime < 500) {
              clickCount++;
            } else {
              clickCount = 1;
            }
            lastClickTime = currentTime;
            if (clickCount === 5) {
              clickCount = 0;
              alert(I18n.t('room.easter_egg_alert'));

              // Check if admin is logged in
              try {
                var res = await fetch('/check-auth');
                var auth = await res.json();
                if (auth.isAdmin) {
                  showSecretAdminModal();
                }
              } catch (e) {}
            }
          });
        }

        function showSecretAdminModal() {
          var modal = document.getElementById('admin-secret-modal');
          var grid = document.getElementById('admin-modal-buttons');
          if (!modal || !grid) return;

          grid.innerHTML = '';
          for (var i = 1; i <= 20; i++) {
            var btn = document.createElement('button');
            btn.className = 'admin-btn';

            if (i === 1) {
              btn.textContent =
                I18n.currentLang === 'zh' ? '\u5168\u670d\u64ad\u62a5' : 'Global Broadcast';
              btn.classList.add('action-primary');
              btn.onclick = async function () {
                var target = prompt(
                  I18n.currentLang === 'zh'
                    ? '\u8bf7\u8f93\u5165\u8303\u56f4 (\u76f4\u63a5\u56de\u8f66\u5168\u90e8\uff0c\u6216\u8f93\u5165 #ID1,ID2)\uff1a'
                    : 'Enter target (Enter for all, or #ID1,ID2):',
                  'all',
                );
                if (target === null) return;
                var content = prompt(
                  I18n.currentLang === 'zh'
                    ? '\u8bf7\u8f93\u5165\u64ad\u62a5\u5185\u5bb9\uff1a'
                    : 'Enter broadcast content:',
                );
                if (!content || !content.trim()) return;
                try {
                  var res = await fetch('/api/admin/broadcast', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: content, target: target }),
                  });
                  var result = await res.json();
                  if (result.success) alert(I18n.t('room.admin.success'));
                } catch (e) {
                  alert('Failed');
                }
              };
            } else if (i === 2) {
              btn.textContent =
                I18n.currentLang === 'zh' ? '\u5173\u95ed\u623f\u95f4' : 'Close Room';
              btn.classList.add('action-danger');
              btn.onclick = async function () {
                var target = prompt(
                  I18n.currentLang === 'zh'
                    ? '\u8bf7\u8f93\u5165\u8303\u56f4 (\u8f93\u5165 "all" \u6216 "#ID1,ID2")\uff1a'
                    : 'Enter target ("all" or "#ID1,ID2"):',
                );
                if (!target || !target.trim()) return;
                if (
                  !confirm(
                    I18n.currentLang === 'zh'
                      ? '\u786e\u8ba4\u6267\u884c\u6b64\u64cd\u4f5c\uff1f\u8303\u56f4: ' + target
                      : 'Confirm action for: ' + target,
                  )
                )
                  return;
                try {
                  await fetch('/api/admin/bulk-action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'close_all', target: target }),
                  });
                  location.href = '/';
                } catch (e) {
                  alert('Failed');
                }
              };
            } else if (i === 3 || i === 4) {
              var isLock = i === 3;
              btn.textContent = isLock
                ? I18n.currentLang === 'zh'
                  ? '\u9501\u5b9a\u6240\u6709\u623f\u95f4'
                  : 'Lock All Rooms'
                : I18n.currentLang === 'zh'
                  ? '\u89e3\u9501\u6240\u6709\u623f\u95f4'
                  : 'Unlock All Rooms';
              btn.classList.add(isLock ? 'action-warning' : 'action-success');
              btn.onclick = async function () {
                var target = prompt(
                  I18n.currentLang === 'zh'
                    ? '\u8bf7\u8f93\u5165\u8303\u56f4 (\u8f93\u5165 "all" \u6216 "#ID1,ID2")\uff1a'
                    : 'Enter target ("all" or "#ID1,ID2"):',
                  'all',
                );
                if (!target || !target.trim()) return;
                if (
                  !confirm(
                    I18n.currentLang === 'zh'
                      ? '\u786e\u8ba4\u6267\u884c\u6b64\u64cd\u4f5c\uff1f\u8303\u56f4: ' + target
                      : 'Confirm action for: ' + target,
                  )
                )
                  return;
                try {
                  await fetch('/api/admin/bulk-action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      action: isLock ? 'lock_all' : 'unlock_all',
                      target: target,
                    }),
                  });
                  alert(I18n.t('room.admin.success'));
                } catch (e) {
                  alert('Failed');
                }
              };
            } else if (i === 5) {
              btn.textContent =
                I18n.currentLang === 'zh'
                  ? '\u6279\u91cf\u4fee\u6539\u4eba\u6570'
                  : 'Bulk Set Size';
              btn.classList.add('action-warning');
              btn.onclick = async function () {
                var target = prompt(
                  I18n.currentLang === 'zh'
                    ? '\u8bf7\u8f93\u5165\u8303\u56f4 (\u8f93\u5165 "all" \u6216 "#ID1,ID2")\uff1a'
                    : 'Enter target ("all" or "#ID1,ID2"):',
                  'all',
                );
                if (!target || !target.trim()) return;
                var value = prompt(
                  I18n.currentLang === 'zh'
                    ? '\u8bf7\u8f93\u5165\u7edf\u4e00\u7684\u4eba\u6570\u4e0a\u9650\uff1a'
                    : 'Enter max players:',
                );
                if (!value || isNaN(parseInt(value))) return;
                try {
                  await fetch('/api/admin/bulk-action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      action: 'set_max_players',
                      value: parseInt(value),
                      target: target,
                    }),
                  });
                  alert(I18n.t('room.admin.success'));
                } catch (e) {
                  alert('Failed');
                }
              };
            } else if (i === 7 || i === 8) {
              var isDisable = i === 7;
              btn.textContent = isDisable
                ? I18n.currentLang === 'zh'
                  ? '\u7981\u6b62\u521b\u5efa\u623f\u95f4'
                  : 'Disable Room Creation'
                : I18n.currentLang === 'zh'
                  ? '\u5141\u8bb8\u521b\u5efa\u623f\u95f4'
                  : 'Enable Room Creation';
              btn.classList.add(isDisable ? 'action-warning' : 'action-success');
              btn.onclick = async function () {
                var msg = isDisable
                  ? I18n.currentLang === 'zh'
                    ? '\u786e\u5b9a\u8981\u7981\u6b62\u521b\u5efa\u65b0\u623f\u95f4\u5417\uff1f'
                    : 'Disable NEW rooms?'
                  : I18n.currentLang === 'zh'
                    ? '\u786e\u5b9a\u8981\u5141\u8bb8\u521b\u5efa\u65b0\u623f\u95f4\u5417\uff1f'
                    : 'Enable NEW rooms?';
                if (!confirm(msg)) return;
                try {
                  await fetch('/api/admin/bulk-action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                      action: isDisable ? 'disable_room_creation' : 'enable_room_creation',
                    }),
                  });
                  alert(I18n.t('room.admin.success'));
                } catch (e) {
                  alert('Failed');
                }
              };
            } else {
              btn.textContent = (I18n.currentLang === 'zh' ? '\u529f\u80fd ' : 'Function ') + i;
              btn.onclick = function () {
                alert(btn.textContent + ' clicked!');
              };
            }
            grid.appendChild(btn);
          }

          modal.style.display = 'flex';
        }
      })();
    </script>
  </body>
</html>
